<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriTrack</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <circle cx="16" cy="16" r="15" fill="#16A34A" opacity=".12"/>
          <path d="M16 7c-3.9 0-7 3.1-7 7 0 2.8 1.6 5.2 4 6.3V25a1 1 0 002 0v-1h2v1a1 1 0 002 0v-4.7c2.4-1.1 4-3.5 4-6.3 0-3.9-3.1-7-7-7z" fill="#16A34A"/>
          <path d="M13 14a1 1 0 011-1h4a1 1 0 010 2h-4a1 1 0 01-1-1z" fill="#fff"/>
        </svg>
        <span class="logo-text">NutriTrack</span>
      </div>

      <nav class="date-nav" aria-label="Date navigation">
        <button id="prev-day"  class="nav-btn" aria-label="Previous day">
          <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
        </button>
        <button id="today-btn" class="today-btn">Today</button>
        <span   id="date-display" class="date-display" aria-live="polite"></span>
        <button id="next-day"  class="nav-btn" aria-label="Next day">
          <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
        </button>
      </nav>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────── -->
  <main class="app-main">

    <!-- Dashboard panel -->
    <section class="panel dashboard-panel" aria-label="Daily dashboard">

      <!-- Calorie ring -->
      <div class="ring-section">
        <div class="ring-wrapper" role="img" aria-labelledby="ring-label">
          <svg class="calorie-ring" viewBox="0 0 200 200" aria-hidden="true">
            <defs>
              <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"   stop-color="#4ADE80"/>
                <stop offset="100%" stop-color="#16A34A"/>
              </linearGradient>
            </defs>
            <circle class="ring-track" cx="100" cy="100" r="80"/>
            <circle class="ring-fill"  cx="100" cy="100" r="80" id="ring-fill"/>
          </svg>
          <div class="ring-center">
            <span id="ring-consumed"  class="ring-consumed">0</span>
            <span class="ring-unit">kcal</span>
            <span id="ring-goal-label" class="ring-goal">of 2000</span>
          </div>
        </div>
        <p id="ring-label" class="sr-only">Calorie progress ring</p>
      </div>

      <!-- Macro bars -->
      <div class="macros-section">
        <div class="macro-row">
          <div class="macro-label">
            <span class="macro-dot protein"></span>
            <span class="macro-name">Protein</span>
          </div>
          <div class="macro-bar-track">
            <div id="protein-bar" class="macro-bar protein" style="width:0%"></div>
          </div>
          <span id="protein-val" class="macro-amount">0 / 120g</span>
        </div>
        <div class="macro-row">
          <div class="macro-label">
            <span class="macro-dot carbs"></span>
            <span class="macro-name">Carbs</span>
          </div>
          <div class="macro-bar-track">
            <div id="carbs-bar" class="macro-bar carbs" style="width:0%"></div>
          </div>
          <span id="carbs-val" class="macro-amount">0 / 250g</span>
        </div>
        <div class="macro-row">
          <div class="macro-label">
            <span class="macro-dot fat"></span>
            <span class="macro-name">Fat</span>
          </div>
          <div class="macro-bar-track">
            <div id="fat-bar" class="macro-bar fat" style="width:0%"></div>
          </div>
          <span id="fat-val" class="macro-amount">0 / 65g</span>
        </div>
      </div>

      <!-- Goals editor -->
      <details class="goals-details" id="goals-details">
        <summary class="goals-summary">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16" aria-hidden="true">
            <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
          </svg>
          Edit Daily Goals
          <svg class="summary-chevron" viewBox="0 0 20 20" fill="currentColor" width="16" height="16" aria-hidden="true">
            <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        </summary>
        <form id="goals-form" class="goals-form">
          <div class="goals-grid">
            <label class="goal-field">
              <span class="goal-field-label">Calories (kcal)</span>
              <input type="number" id="goal-kcal" min="1" step="1" class="goal-input" />
            </label>
            <label class="goal-field">
              <span class="goal-field-label">Protein (g)</span>
              <input type="number" id="goal-protein" min="1" step="1" class="goal-input" />
            </label>
            <label class="goal-field">
              <span class="goal-field-label">Carbs (g)</span>
              <input type="number" id="goal-carbs" min="1" step="1" class="goal-input" />
            </label>
            <label class="goal-field">
              <span class="goal-field-label">Fat (g)</span>
              <input type="number" id="goal-fat" min="1" step="1" class="goal-input" />
            </label>
          </div>
          <button type="submit" class="btn-primary goals-save-btn">Save Goals</button>
        </form>
      </details>

    </section><!-- /dashboard-panel -->

    <!-- Logger panel -->
    <section class="panel logger-panel" aria-label="Food logger">

      <!-- Search -->
      <div class="search-section">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
          </svg>
          <input
            type="search"
            id="search-input"
            class="search-input"
            placeholder="Search foods to add…"
            autocomplete="off"
            aria-label="Search foods"
            aria-autocomplete="list"
            aria-controls="search-results"
          />
          <button id="clear-search" class="clear-btn" hidden aria-label="Clear search">&times;</button>
        </div>
        <ul id="search-results" class="search-results" hidden role="listbox" aria-label="Search results"></ul>
      </div>

      <!-- Entries -->
      <div class="entries-section">
        <h2 class="section-heading">
          <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
            <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/>
            <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/>
          </svg>
          Today's Log
        </h2>
        <div id="entries-list" class="entries-list" aria-live="polite">
          <div class="empty-state">
            <svg viewBox="0 0 48 48" fill="none" width="48" height="48" aria-hidden="true">
              <circle cx="24" cy="24" r="22" stroke="#D1FAE5" stroke-width="2"/>
              <path d="M16 24h16M24 16v16" stroke="#6EE7B7" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
            <p>No entries yet.<br/>Search for a food above to get started.</p>
          </div>
        </div>
      </div>

    </section><!-- /logger-panel -->
  </main>

  <!-- ── Portion modal ───────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <button id="modal-close" class="modal-close-btn" aria-label="Close modal">&times;</button>

      <div class="modal-header">
        <h3 id="modal-title"  class="modal-food-name"></h3>
        <span id="modal-category" class="category-badge"></span>
      </div>

      <label class="portion-label" for="modal-grams">Portion size</label>
      <div class="portion-input-wrap">
        <input
          type="number"
          id="modal-grams"
          class="portion-input"
          min="1"
          step="1"
          value="100"
          aria-label="Portion in grams"
        />
        <span class="portion-unit">grams</span>
      </div>

      <div id="modal-preview" class="modal-preview" aria-live="polite"></div>

      <div class="modal-actions">
        <button id="modal-cancel"  class="btn-secondary">Cancel</button>
        <button id="modal-confirm" class="btn-primary">Add to Log</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ───────────────────────────────────────────── -->
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="app.js"></script>
</body>
</html>
